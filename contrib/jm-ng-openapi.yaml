          anyOf:
            - type: string
            - type: 'null'
          title: Error
        stale:
          type: boolean
          title: Stale
          default: false
      type: object
      required:
        - plan_id
        - wallet_name
        - status
        - destinations
        - current_phase
        - phases
        - created_at
        - updated_at
      title: TumblerPlanResponse
      description: Response body returned by tumbler plan / status endpoints.
