              minimum: 0
            - type: 'null'
          title: Txfee
      type: object
      required:
        - mixdepth
        - amount_sats
        - destination
      title: DirectSendRequest
      description: |-
        POST /api/v1/wallet/{walletname}/taker/direct-send request.

        ``amount_sats`` is the amount to send in satoshis; ``0`` means sweep the
        entire mixdepth. ``mixdepth`` is the source account index.
    DirectSendResponse:
      properties:
        txinfo:
          $ref: '#/components/schemas/TxInfo'
      type: object
      required:
        - txinfo
      title: DirectSendResponse
      description: Response for direct-send.
    DoCoinjoinRequest:
      properties:
        mixdepth:
          type: integer
          minimum: 0
          title: Mixdepth
        amount_sats:
          type: integer
          maximum: 2100000000000000
          minimum: 0
          title: Amount Sats
        counterparties:
          type: integer
          maximum: 20
          minimum: 2
          title: Counterparties
        destination:
          type: string
          title: Destination
        txfee:
          anyOf:
            - type: integer
              minimum: 0
            - type: 'null'
          title: Txfee
      type: object
      required:
        - mixdepth
        - amount_sats
        - counterparties
        - destination
      title: DoCoinjoinRequest
      description: |-
        POST /api/v1/wallet/{walletname}/taker/coinjoin request.

        ``counterparties`` is the number of makers requested in the coinjoin;
        the lower bound of 2 matches the minimum the taker protocol can run with,
        and the upper bound prevents a malformed request from triggering large
        allocations / long-running RPC under the auth boundary.
