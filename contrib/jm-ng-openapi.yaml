openapi: 3.1.0
info:
  title: JoinMarket wallet daemon
  description: JAM-compatible HTTP/WebSocket API for JoinMarket-NG
  version: 0.17.0
paths:
  /api/v1/getinfo:
    get:
      summary: Get Info
      description: Return backend version information.
      operationId: version
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetInfoResponse'
  /api/v1/session:
    get:
      summary: Get Session
      description: |-
        Heartbeat / status endpoint.

        If an Authorization header is present, it is validated. An invalid
        token returns 401. A missing token is fine (unauthenticated access).
      operationId: session
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
  /api/v1/wallet/all:
    get:
      summary: List Wallets
      description: List available wallet files.
      operationId: listwallets
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListWalletsResponse'
  /api/v1/wallet/create:
    post:
      summary: Wallet Create
      description: Create a new wallet.
      operationId: createwallet
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWalletRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateWalletResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/wallet/recover:
    post:
      summary: Wallet Recover
      description: Recover a wallet from a seed phrase.
      operationId: recoverwallet
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecoverWalletRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateWalletResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/wallet/{walletname}/unlock:
    post:
      summary: Wallet Unlock
      description: Unlock (decrypt) a wallet.
      operationId: unlockwallet
      parameters:
        - name: walletname
          in: path
          required: true
          schema:
            type: string
            title: Walletname
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnlockWalletRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnlockWalletResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/wallet/{walletname}/lock:
    get:
      summary: Wallet Lock
      description: Lock the current wallet and stop all services.
      operationId: lockwallet
      parameters:
        - name: walletname
          in: path
          required: true
          schema:
            type: string
            title: Walletname
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LockWalletResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/token:
    post:
      summary: Token Refresh
      description: Refresh the access/refresh token pair.
      operationId: token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/wallet/{walletname}/display:
    get:
      summary: Wallet Display
      description: Return full wallet display with accounts, branches, and entries.
      operationId: displaywallet
      parameters:
        - name: walletname
          in: path
          required: true
          schema:
            type: string
            title: Walletname
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletDisplayResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/wallet/{walletname}/utxos:
    get:
      summary: List Utxos
      description: List all UTXOs in the wallet.
      operationId: listutxos
      parameters:
        - name: walletname
          in: path
          required: true
          schema:
            type: string
            title: Walletname
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListUtxosResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/wallet/{walletname}/history:
    get:
      summary: Wallet History
      description: |-
        Return the active wallet's CoinJoin/spend history (from history.csv).

        Entries are scoped to the active wallet's master fingerprint and returned
        most-recent first. Pass ``?limit=N`` to cap the number of entries. This is
        the same data the ``jm-wallet history`` CLI reads; it is read-only.
      operationId: wallethistory
      parameters:
        - name: walletname
          in: path
          required: true
          schema:
            type: string
            title: Walletname
        - name: limit
          in: query
          required: false
          schema:
            anyOf:
              - type: integer
              - type: 'null'
            title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletHistoryResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/wallet/{walletname}/address/new/{mixdepth}:
    get:
      summary: Get New Address
      description: Get a new receive address for the specified mixdepth.
      operationId: getaddress
      parameters:
        - name: walletname
          in: path
          required: true
          schema:
            type: string
            title: Walletname
        - name: mixdepth
          in: path
          required: true
          schema:
            type: string
            title: Mixdepth
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAddressResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/wallet/{walletname}/address/timelock/new/{lockdate}:
    get:
      summary: Get Timelock Address
      description: |-
        Get a new timelocked (fidelity bond) address.

        The lockdate should be in YYYY-mm format (e.g., "2025-06").
      operationId: gettimelockaddress
      parameters:
        - name: walletname
          in: path
          required: true
          schema:
            type: string
            title: Walletname
        - name: lockdate
          in: path
          required: true
          schema:
            type: string
            title: Lockdate
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAddressResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/wallet/{walletname}/getseed:
    get:
      summary: Get Seed
      description: Return the wallet's BIP39 mnemonic seed phrase.
      operationId: getseed
      parameters:
        - name: walletname
          in: path
          required: true
          schema:
            type: string
            title: Walletname
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetSeedResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/wallet/{walletname}/freeze:
    post:
      summary: Freeze Utxo
      description: Freeze or unfreeze a UTXO.
      operationId: freeze
      parameters:
        - name: walletname
          in: path
          required: true
          schema:
            type: string
            title: Walletname
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FreezeRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
                title: Response Freeze
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/wallet/{walletname}/configget:
    post:
      summary: Config Get
      description: Read a config variable (in-memory override takes priority).
      operationId: configget
      parameters:
        - name: walletname
          in: path
          required: true
          schema:
            type: string
            title: Walletname
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigGetRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigGetResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/wallet/{walletname}/configset:
    post:
      summary: Config Set
      description: Set a config variable (in-memory only, not persisted).
      operationId: configsetting
      parameters:
        - name: walletname
          in: path
          required: true
          schema:
            type: string
            title: Walletname
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigSetRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
                title: Response Configsetting
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/wallet/{walletname}/rescanblockchain/{blockheight}:
    get:
      summary: Rescan Blockchain
      description: Trigger a blockchain rescan from the given block height.
      operationId: rescanblockchain
      parameters:
        - name: walletname
          in: path
          required: true
          schema:
            type: string
            title: Walletname
        - name: blockheight
          in: path
          required: true
          schema:
            type: integer
            title: Blockheight
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RescanBlockchainResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/wallet/{walletname}/getrescaninfo:
    get:
      summary: Get Rescan Info
      description: Get rescan progress information.
      operationId: getrescaninfo
      parameters:
        - name: walletname
          in: path
          required: true
          schema:
            type: string
            title: Walletname
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RescanInfoResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/wallet/{walletname}/signmessage:
    post:
      summary: Sign Message
      description: Sign a message with a wallet key at the given HD path.
      operationId: signmessage
      parameters:
        - name: walletname
          in: path
          required: true
          schema:
            type: string
            title: Walletname
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignMessageRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignMessageResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/wallet/yieldgen/report:
    get:
      summary: Yieldgen Report
      description: |-
        Return the yield generator (maker earnings) report.

        The joinmarket-ng maker logs its activity to ``history.csv`` (its single
        source of truth) rather than the legacy ``yigen-statement.csv`` file, so the
        report is synthesized from the successful maker rows of ``history.csv`` in
        the reference comma-separated format the Earn report UI expects (a header
        row, a ``Connected`` marker row, then one row per CoinJoin).
      operationId: yieldgenreport
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YieldGenReportResponse'
  /api/v1/wallet/{walletname}/taker/direct-send:
    post:
      summary: Direct Send
      description: Send bitcoin directly (without coinjoin).
      operationId: directsend
      parameters:
        - name: walletname
          in: path
          required: true
          schema:
            type: string
            title: Walletname
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DirectSendRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DirectSendResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/wallet/{walletname}/taker/coinjoin:
    post:
      summary: Do Coinjoin
      description: Initiate a coinjoin transaction (asynchronous).
      operationId: docoinjoin
      parameters:
        - name: walletname
          in: path
          required: true
          schema:
            type: string
            title: Walletname
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoCoinjoinRequest'
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/wallet/{walletname}/taker/stop:
    get:
      summary: Stop Coinjoin
      description: Stop a running coinjoin/tumbler.
      operationId: stopcoinjoin
      parameters:
        - name: walletname
          in: path
          required: true
          schema:
            type: string
            title: Walletname
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/wallet/{walletname}/maker/start:
    post:
      summary: Start Maker
      description: Start the yield generator (maker) service.
      operationId: startmaker
      parameters:
        - name: walletname
          in: path
          required: true
          schema:
            type: string
            title: Walletname
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartMakerRequest'
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/wallet/{walletname}/maker/stop:
    get:
      summary: Stop Maker
      description: Stop the yield generator (maker) service.
      operationId: stopmaker
      parameters:
        - name: walletname
          in: path
          required: true
          schema:
            type: string
            title: Walletname
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/wallet/{walletname}/tumbler/plan:
    post:
      summary: Create Plan
      description: |-
        Build and persist a fresh tumble plan for the active wallet.

        An already-running plan for the wallet is always protected: callers must
        ``POST /tumbler/stop`` first. A plan in any other state (pending,
        completed, failed, cancelled) is overwritten unconditionally -- passing
        ``force=true`` is only required for a pending plan, to make the
        destructive intent explicit.
      operationId: tumblerplan
      parameters:
        - name: walletname
          in: path
          required: true
          schema:
            type: string
            title: Walletname
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TumblerPlanRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TumblerPlanResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      summary: Delete Plan Endpoint
      description: Remove a non-running plan from disk.
      operationId: tumblerplandelete
      parameters:
        - name: walletname
          in: path
          required: true
          schema:
            type: string
            title: Walletname
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/wallet/{walletname}/tumbler/status:
    get:
      summary: Get Status
      description: |-
        Return the live plan if the runner is active, otherwise the on-disk plan.

        When the on-disk plan is ``RUNNING`` but no runner is live, the response's
        ``stale`` flag is set so the UI can prompt the user to acknowledge the
        failure and delete the plan.
      operationId: tumblerstatus
      parameters:
        - name: walletname
          in: path
          required: true
          schema:
            type: string
            title: Walletname
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TumblerPlanResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/wallet/{walletname}/tumbler/start:
    post:
      summary: Start Plan
      description: Load the pending plan and run it in the background.
      operationId: tumblerstart
      parameters:
        - name: walletname
          in: path
          required: true
          schema:
            type: string
            title: Walletname
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/wallet/{walletname}/tumbler/stop:
    post:
      summary: Stop Plan
      description: Cooperatively stop the running plan; transition it to ``CANCELLED``.
      operationId: tumblerstop
      parameters:
        - name: walletname
          in: path
          required: true
          schema:
            type: string
            title: Walletname
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/obwatch/orderbook.json:
    get:
      summary: Get Orderbook
      description: Proxy orderbook data from the orderbook_watcher service.
      operationId: get_orderbook_api_v1_obwatch_orderbook_json_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/obwatch/refreshorderbook:
    get:
      summary: Refresh Orderbook Get
      description: GET compatibility endpoint for orderbook refresh.
      operationId: refresh_orderbook_get_api_v1_obwatch_refreshorderbook_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
    post:
      summary: Refresh Orderbook Post
      description: POST compatibility endpoint for JAM frontend refresh calls.
      operationId: refresh_orderbook_post_api_v1_obwatch_refreshorderbook_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/logs:
    get:
      summary: Get Logs
      description: Return the recent in-memory log buffer as plain text.
      operationId: getlogs
      responses:
        '200':
          description: Successful Response
          content:
            text/plain:
              schema:
                type: string
  /obwatch/orderbook.json:
    get:
      summary: Get Orderbook
      description: Proxy orderbook data from the orderbook_watcher service.
      operationId: get_orderbook_obwatch_orderbook_json_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /obwatch/refreshorderbook:
    get:
      summary: Refresh Orderbook Get
      description: GET compatibility endpoint for orderbook refresh.
      operationId: refresh_orderbook_get_obwatch_refreshorderbook_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
    post:
      summary: Refresh Orderbook Post
      description: POST compatibility endpoint for JAM frontend refresh calls.
      operationId: refresh_orderbook_post_obwatch_refreshorderbook_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /:
    options:
      summary: Cors Preflight
      operationId: cors_preflight__options
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
components:
  schemas:
    ConfigGetRequest:
      properties:
        section:
          type: string
          title: Section
        field:
          type: string
          title: Field
      type: object
      required:
        - section
        - field
      title: ConfigGetRequest
      description: POST /api/v1/wallet/{walletname}/configget request.
    ConfigGetResponse:
      properties:
        configvalue:
          type: string
          title: Configvalue
      type: object
      required:
        - configvalue
      title: ConfigGetResponse
      description: Response for configget.
    ConfigSetRequest:
      properties:
        section:
          type: string
          title: Section
        field:
          type: string
          title: Field
        value:
          type: string
          title: Value
      type: object
      required:
        - section
        - field
        - value
      title: ConfigSetRequest
      description: POST /api/v1/wallet/{walletname}/configset request.
    CreateWalletRequest:
      properties:
        walletname:
          type: string
          title: Walletname
        password:
          type: string
          title: Password
        wallettype:
          type: string
          title: Wallettype
          default: sw-fb
      type: object
      required:
        - walletname
        - password
      title: CreateWalletRequest
      description: POST /api/v1/wallet/create request.
    CreateWalletResponse:
      properties:
        walletname:
          type: string
          title: Walletname
        seedphrase:
          type: string
          title: Seedphrase
        token:
          type: string
          title: Token
        token_type:
          type: string
          title: Token Type
          default: bearer
        expires_in:
          type: integer
          title: Expires In
          default: 1800
        scope:
          type: string
          title: Scope
          default: ''
        refresh_token:
          type: string
          title: Refresh Token
      type: object
      required:
        - walletname
        - seedphrase
        - token
        - refresh_token
      title: CreateWalletResponse
      description: Response for wallet create and recover.
    DirectSendRequest:
      properties:
        mixdepth:
          type: integer
          minimum: 0
          title: Mixdepth
        amount_sats:
          type: integer
          maximum: 2100000000000000
          minimum: 0
          title: Amount Sats
        destination:
          type: string
          title: Destination
